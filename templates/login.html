<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Unified Messenger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #232946 0%, #121629 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1a1a2e;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            color: #f8f9fa;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
        }
        .form-control, .btn-primary {
            border-radius: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #232946, #3a3f5c);
            border: none;
        }
        .btn-primary:hover {
            background: #232946;
        }
        .login-title {
            color: #f8f9fa;
            font-weight: 700;
        }
        .login-subtitle {
            color: #b0b3b8;
        }
        .alert {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-chat-dots-fill" style="font-size: 2.5rem; color: #4cc9f0;"></i>
            <h2 class="login-title mt-2 mb-0">Unified Messenger</h2>
            <div class="login-subtitle mb-2">Sign in to continue</div>
        </div>
        <form id="login-form">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-3 position-relative">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                <i class="bi bi-eye-slash position-absolute" 
                style="right: 12px; top: 38px; cursor: pointer;" 
                onclick="togglePassword()"></i>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
        </form>
        <div id="login-alert" class="alert alert-danger mt-3 d-none" role="alert"></div>
        <div class="text-center mt-3">
            <small class="text-muted">Demo: admin / admin123</small>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('login-alert');
            alertDiv.classList.add('d-none');
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    alertDiv.textContent = data.error || 'Invalid credentials';
                    alertDiv.classList.remove('d-none');
                }
            } catch (err) {
                alertDiv.textContent = 'Network error. Please try again.';
                alertDiv.classList.remove('d-none');
            }
        });
        function togglePassword() {
            const password = document.getElementById('password');
            const icon = event.target;
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            } else {
                password.type = 'password';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            }
        }
    </script>
</body>
</html>
